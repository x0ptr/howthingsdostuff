<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HowThingsDoStuff(TM)</title>
  <meta name="description" content="HowThingsDoStuff(TM) searchable video feed.">
  <style>
    :root {
      --bg: #05060b;
      --surface: #0d1019cc;
      --surface-strong: #131827;
      --line: #232a40;
      --text: #f2f5ff;
      --muted: #9ca7cd;
      --brand: #7c9dff;
      --brand-2: #66f2cf;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1000px 500px at 0% -5%, rgba(124, 157, 255, 0.2), transparent 55%),
        radial-gradient(900px 450px at 100% 0%, rgba(102, 242, 207, 0.12), transparent 52%),
        var(--bg);
      line-height: 1.45;
      min-height: 100dvh;
    }

    .top-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    .top-nav-inner {
      width: min(980px, calc(100% - 1.2rem));
      margin: 0 auto;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.8rem;
      align-items: center;
      padding: 0.72rem 0;
    }

    .brand {
      font-weight: 800;
      letter-spacing: -0.02em;
      white-space: nowrap;
      font-size: 0.95rem;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #111528;
      color: var(--text);
      padding: 0.62rem 0.78rem;
      font-size: 0.95rem;
      outline: none;
    }

    .search:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(124, 157, 255, 0.16);
    }

    .right-actions {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.6rem;
      white-space: nowrap;
    }

    .result-count {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: right;
    }

    .github-link {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--line);
      background: #111528;
      border-radius: 10px;
      padding: 0.42rem 0.65rem;
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .github-link:hover {
      border-color: var(--brand);
      color: var(--brand-2);
    }

    .wrap {
      width: min(980px, calc(100% - 1.2rem));
      margin: 0 auto;
    }

    .videos {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.95rem;
      padding: 1.2rem 0 2rem;
    }

    .card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 28%), var(--surface-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-columns: 300px 1fr;
      align-items: stretch;
    }

    .video-shell {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #090d18;
      overflow: hidden;
    }

    .video-thumb {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.02);
      filter: saturate(1.05) contrast(1.03);
    }

    .play {
      position: absolute;
      inset: 0;
      border: 0;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at center, rgba(0, 0, 0, 0.22), rgba(0, 0, 0, 0.54));
      color: white;
      cursor: pointer;
    }

    .play-icon {
      width: 62px;
      height: 62px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      color: #111;
      display: grid;
      place-items: center;
      font-size: 1.16rem;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.3);
      padding-left: 0.1rem;
    }

    .card-body {
      padding: 0.88rem 0.95rem 0.95rem;
      display: grid;
      gap: 0.55rem;
      align-content: start;
    }

    .meta-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.45rem;
    }

    .channel {
      margin: 0;
      color: var(--brand-2);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      border: 1px solid rgba(102, 242, 207, 0.35);
      border-radius: 999px;
      padding: 0.22rem 0.46rem;
      background: rgba(102, 242, 207, 0.08);
    }

    h2 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.3;
    }

    .video-id {
      margin: 0;
      color: var(--muted);
      font-size: 0.72rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.18rem 0.45rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      background: rgba(255, 255, 255, 0.02);
    }

    .link {
      color: var(--brand);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .link:hover { text-decoration: underline; }

    .empty {
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 1rem;
      text-align: center;
      margin-bottom: 2rem;
      display: none;
    }

    footer {
      border-top: 1px solid var(--line);
      margin-top: 0.25rem;
      padding: 1rem 0 2rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    @media (max-width: 780px) {
      .top-nav-inner { grid-template-columns: 1fr; }
      .right-actions { justify-content: space-between; }
      .card { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="top-nav" aria-label="Top navigation">
    <div class="top-nav-inner">
      <div class="brand">HowThingsDoStuff(TM)</div>
      <input
        id="search-input"
        class="search"
        type="search"
        placeholder="Search title, channel or link..."
        aria-label="Search videos"
      >
      <div class="right-actions">
        <div class="result-count" id="result-count">0 results</div>
        <a
          class="github-link"
          href="https://github.com/x0ptr/howthingsdostuff"
          target="_blank"
          rel="noreferrer noopener"
          aria-label="Open GitHub repository to propose videos"
          title="Pull request new videos"
        >
          >> github
        </a>
      </div>
    </div>
  </nav>

  <div class="wrap">
    <main>
      <section class="videos" id="video-grid" aria-label="Video list"></section>
      <p class="empty" id="empty-state">No videos match this search yet.</p>
    </main>

    <footer>
      &copy; <span id="year"></span> howthingsdostuff.com
    </footer>
  </div>

  <script>
    const videoCatalog = [
    {
        "link": "https://youtu.be/wfr4QN1Hvhs?si=0xl87EYYAOE2okK5",
        "title": "Valve Steam Controller Review | Latency Benchmarks, Battery Life, Repairability",
        "channel": "Gamers Nexus"
    },
    {
        "link": "https://www.youtube.com/watch?v=h-NM1xSSzHQ",
        "title": "How do Computer Keyboards Work? 🤔⌨⌨🛠",
        "channel": "Branch Education"
    },
    {
        "link": "https://youtu.be/Sx9zG7wa4FA?si=_dtGLlQ6mFqnxDFX",
        "title": "The Complete Bash Scripting Course - Full Length Guide to learning the Bash Shell",
        "channel": "You Suck at Programming"
    },
    {
        "link": "https://youtu.be/aircAruvnKk?si=9aREY3tQRC6nUBrT",
        "title": "But what is a neural network? | Deep learning chapter 1",
        "channel": "3Blue1Brown"
    },
    ];

    const grid = document.getElementById("video-grid");
    const emptyState = document.getElementById("empty-state");
    const searchInput = document.getElementById("search-input");
    const resultCount = document.getElementById("result-count");
    const year = document.getElementById("year");
    year.textContent = String(new Date().getFullYear());

    const getVideoId = (url) => {
      try {
        const parsed = new URL(url);
        if (parsed.hostname.includes("youtu.be")) {
          return parsed.pathname.replace("/", "");
        }
        if (parsed.hostname.includes("youtube.com")) {
          return parsed.searchParams.get("v");
        }
      } catch (_err) {
        return null;
      }
      return null;
    };

    const createCard = (video) => {
      const videoId = getVideoId(video.link);
      if (!videoId) return null;

      const card = document.createElement("article");
      card.className = "card";
      card.dataset.searchText = `${video.title} ${video.channel} ${video.link}`.toLowerCase();

      const shell = document.createElement("div");
      shell.className = "video-shell";

      const thumb = document.createElement("img");
      thumb.className = "video-thumb";
      thumb.loading = "lazy";
      thumb.alt = `${video.title} thumbnail`;
      thumb.src = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;

      const play = document.createElement("button");
      play.className = "play";
      play.type = "button";
      play.setAttribute("aria-label", `Play ${video.title}`);
      play.innerHTML = '<span class="play-icon">▶</span>';

      shell.append(thumb, play);

      const body = document.createElement("div");
      body.className = "card-body";

      const metaRow = document.createElement("div");
      metaRow.className = "meta-row";

      const channel = document.createElement("p");
      channel.className = "channel";
      channel.textContent = video.channel || "YouTube";

      const code = document.createElement("p");
      code.className = "video-id";
      code.textContent = `id:${videoId}`;

      const title = document.createElement("h2");
      title.textContent = video.title || "YouTube video";

      const openLink = document.createElement("a");
      openLink.className = "link";
      openLink.href = video.link;
      openLink.target = "_blank";
      openLink.rel = "noreferrer noopener";
      openLink.textContent = "Open on YouTube";

      metaRow.append(channel, code);
      body.append(metaRow, title, openLink);
      card.append(shell, body);

      play.addEventListener("click", () => {
        const iframe = document.createElement("iframe");
        iframe.title = video.title || "YouTube video";
        iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
        iframe.allowFullscreen = true;
        iframe.loading = "lazy";
        iframe.referrerPolicy = "strict-origin-when-cross-origin";
        iframe.src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0`;
        shell.replaceChildren(iframe);
      });

      return card;
    };

    const cards = videoCatalog
      .map((video) => createCard(video))
      .filter((card) => Boolean(card));

    cards.forEach((card) => {
      grid.append(card);
    });

    const applySearch = () => {
      const q = searchInput.value.trim().toLowerCase();
      let visible = 0;

      cards.forEach((card) => {
        const match = !q || card.dataset.searchText.includes(q);
        card.style.display = match ? "" : "none";
        if (match) visible += 1;
      });

      resultCount.textContent = `${visible} result${visible === 1 ? "" : "s"}`;
      emptyState.style.display = visible === 0 ? "block" : "none";
    };

    searchInput.addEventListener("input", applySearch);
    applySearch();
  </script>
</body>
</html>
